name: Build s2geography_c
description: Build the s2geography C API library from source (temporary until JLL is available)

outputs:
  lib-path:
    description: Colon-separated paths to directories containing built shared libraries
    value: ${{ steps.paths.outputs.lib_path }}

runs:
  using: composite
  steps:
    - name: Checkout s2geography
      uses: actions/checkout@v4
      with:
        repository: paleolimbot/s2geography
        ref: main
        path: _deps/s2geography

    - name: Checkout s2geography_c
      uses: actions/checkout@v4
      with:
        repository: asinghvi17/s2geography_c
        ref: main
        path: _deps/s2geography_c

    - name: Setup conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-variant: Miniforge3
        miniforge-version: latest
        activate-environment: s2geography-dev
        use-mamba: true
        mamba-version: "*"

    - name: Install C++ dependencies
      shell: bash -l {0}
      run: mamba install -y -n s2geography-dev cxx-compiler libabseil cmake openssl

    # Step 1: Build and install s2geography (C++ library)
    - name: Configure s2geography
      shell: bash -l {0}
      run: |
        cmake -S _deps/s2geography -B _build/s2geography \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/_install" \
          -DS2GEOGRAPHY_S2_SOURCE=BUNDLED

    - name: Build and install s2geography
      shell: bash -l {0}
      run: |
        cmake --build _build/s2geography --config Release -j4
        cmake --install _build/s2geography

    # Step 2: Build s2geography_c (C API) against installed s2geography
    # The s2geography installed cmake config references OpenSSL::SSL,
    # but doesn't auto-call find_package(OpenSSL). Patch s2geography_c
    # to find it before find_package(s2geography).
    - name: Configure s2geography_c
      shell: bash -l {0}
      run: |
        sed -i '1i find_package(OpenSSL REQUIRED)' _deps/s2geography_c/CMakeLists.txt
        cmake -S _deps/s2geography_c -B _build/s2geography_c \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/_install;${CONDA_PREFIX}"

    - name: Build s2geography_c
      shell: bash -l {0}
      run: cmake --build _build/s2geography_c --config Release -j4

    - name: Set library paths
      id: paths
      shell: bash -l {0}
      run: |
        S2GEOG_LIB="${GITHUB_WORKSPACE}/_install/lib"
        S2GEOG_C_LIB="${GITHUB_WORKSPACE}/_build/s2geography_c"
        S2_LIB="${GITHUB_WORKSPACE}/_build/s2geography/_deps/s2-build"
        NANOARROW_LIB="${GITHUB_WORKSPACE}/_build/s2geography/_deps/nanoarrow-build"
        LIB_PATH="${S2GEOG_C_LIB}:${S2GEOG_LIB}:${S2_LIB}:${NANOARROW_LIB}"
        echo "lib_path=${LIB_PATH}" >> "$GITHUB_OUTPUT"
